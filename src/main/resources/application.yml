# 服务基础配置
server:
  port: ${SERVER_PORT:8080}

spring:
  # 应用名称
  application:
    name: enjoy-agent
  # 关闭默认用户密码，避免和我们自己的认证逻辑冲突
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  profiles:
    active: local
  # PostgreSQL 数据源配置
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:enjoy_agent}
    username: ${DB_USERNAME:enjoy}
    password: ${DB_PASSWORD:enjoy123}
  data:
    # Redis 暂时只作为基础设施预留，先不启用 Repository 扫描
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false
  # JPA 基础配置
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# 日志级别配置
logging:
  level:
    com.enjoy.agent: INFO
    org.springframework.security: INFO

# 平台自定义配置
enjoy:
  security:
    jwt-secret: ${APP_JWT_SECRET:change-me-to-a-long-random-string}
    access-token-expiration-seconds: 7200
  credential:
    aes-key: ${APP_CREDENTIAL_AES_KEY:0123456789abcdef0123456789abcdef}
  model-gateway:
    openai-base-url: ${APP_MODEL_GATEWAY_OPENAI_BASE_URL:https://api.openai.com}
    platform-openai-api-key: ${APP_PLATFORM_OPENAI_API_KEY:}
  billing:
    enabled: ${APP_BILLING_ENABLED:false}
    currency: ${APP_BILLING_CURRENCY:CNY}
    rabbit:
      exchange: ${APP_BILLING_RABBIT_EXCHANGE:enjoy.agent.events}
      usage-routing-key: ${APP_BILLING_RABBIT_USAGE_ROUTING_KEY:billing.usage}
      usage-queue: ${APP_BILLING_RABBIT_USAGE_QUEUE:billing.usage.queue}
      usage-dead-letter-routing-key: ${APP_BILLING_RABBIT_USAGE_DLQ_ROUTING_KEY:billing.usage.dlq}
      usage-dead-letter-queue: ${APP_BILLING_RABBIT_USAGE_DLQ:billing.usage.dlq}
  mcp:
    oauth:
      public-base-url: ${APP_MCP_OAUTH_PUBLIC_BASE_URL:http://localhost:${server.port}}
      callback-path: ${APP_MCP_OAUTH_CALLBACK_PATH:/api/mcp/oauth/callback}
      refresh-skew-seconds: ${APP_MCP_OAUTH_REFRESH_SKEW_SECONDS:60}
      authorization-ttl-seconds: ${APP_MCP_OAUTH_AUTHORIZATION_TTL_SECONDS:600}
    runtime:
      max-tool-rounds: ${APP_MCP_MAX_TOOL_ROUNDS:3}
      max-tool-result-chars: ${APP_MCP_MAX_TOOL_RESULT_CHARS:4000}
      http-connect-timeout-seconds: ${APP_MCP_HTTP_CONNECT_TIMEOUT_SECONDS:10}
      http-read-timeout-seconds: ${APP_MCP_HTTP_READ_TIMEOUT_SECONDS:60}
  knowledge:
    chunk-size: ${APP_KNOWLEDGE_CHUNK_SIZE:800}
    chunk-overlap: ${APP_KNOWLEDGE_CHUNK_OVERLAP:100}
    embedding-dimensions: ${APP_KNOWLEDGE_EMBEDDING_DIMENSIONS:1024}
    recall-top-k: ${APP_KNOWLEDGE_RECALL_TOP_K:12}
    retrieval-top-k: ${APP_KNOWLEDGE_RETRIEVAL_TOP_K:4}
    query-rewrite-enabled: ${APP_KNOWLEDGE_QUERY_REWRITE_ENABLED:true}
    query-rewrite-max-context-messages: ${APP_KNOWLEDGE_QUERY_REWRITE_MAX_CONTEXT_MESSAGES:6}
    retrieval-debug-enabled: ${APP_KNOWLEDGE_RETRIEVAL_DEBUG_ENABLED:true}
    rerank-base-url: ${APP_KNOWLEDGE_RERANK_BASE_URL:https://dashscope.aliyuncs.com}
    search:
      enabled: ${APP_KNOWLEDGE_SEARCH_ENABLED:false}
      base-url: ${APP_KNOWLEDGE_SEARCH_BASE_URL:http://localhost:9200}
      username: ${APP_KNOWLEDGE_SEARCH_USERNAME:}
      password: ${APP_KNOWLEDGE_SEARCH_PASSWORD:}
      index-name: ${APP_KNOWLEDGE_SEARCH_INDEX_NAME:knowledge-chunk-v1}
      dense-top-k: ${APP_KNOWLEDGE_SEARCH_DENSE_TOP_K:12}
      lexical-top-k: ${APP_KNOWLEDGE_SEARCH_LEXICAL_TOP_K:12}
      rrf-k: ${APP_KNOWLEDGE_SEARCH_RRF_K:60}
      connect-timeout-seconds: ${APP_KNOWLEDGE_SEARCH_CONNECT_TIMEOUT_SECONDS:5}
      read-timeout-seconds: ${APP_KNOWLEDGE_SEARCH_READ_TIMEOUT_SECONDS:20}
      index-analyzer: ${APP_KNOWLEDGE_SEARCH_INDEX_ANALYZER:standard}
      search-analyzer: ${APP_KNOWLEDGE_SEARCH_SEARCH_ANALYZER:standard}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:enjoy-agent}

# OpenAPI / Swagger UI 调试配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    persist-authorization: true
    display-request-duration: true
